<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meirins Coach · Panel de entrenadora</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="coach.css">
</head>
<body class="coach-body">

  <!-- ── LOGIN / REGISTER ── -->
  <div id="auth-screen" class="coach-auth">
    <div class="coach-auth-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <a href="index.html" class="coach-back">← <span data-i18n="back">Volver</span></a>
        <div style="display:flex;gap:6px;">
          <button class="coach-lang-btn active" id="cbtn-es" onclick="setCoachLang('es')">ES</button>
          <button class="coach-lang-btn" id="cbtn-en" onclick="setCoachLang('en')">EN</button>
          <button class="coach-lang-btn" id="cbtn-fr" onclick="setCoachLang('fr')">FR</button>
        </div>
      </div>
      <div class="coach-logo">
        <span>🌙</span>
        <span class="coach-brand">Meirins <strong>Coach</strong></span>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')" data-i18n="tab.login">Entrar</button>
        <button class="auth-tab" onclick="showTab('register')" data-i18n="tab.register">Crear cuenta</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <input class="auth-input" type="email" id="login-email" placeholder="Email" required />
        <input class="auth-input" type="password" id="login-password" data-i18n-placeholder="placeholder.password" placeholder="Contraseña" required />
        <p id="login-error" class="auth-error"></p>
        <button class="auth-btn" type="submit" id="login-btn" data-i18n="tab.login">Entrar</button>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <input class="auth-input" type="text" id="reg-name" data-i18n-placeholder="placeholder.name" placeholder="Tu nombre" required />
        <input class="auth-input" type="email" id="reg-email" placeholder="Email" required />
        <input class="auth-input" type="password" id="reg-password" data-i18n-placeholder="placeholder.password6" placeholder="Contraseña (mín. 6 caracteres)" minlength="6" required />
        <p id="reg-error" class="auth-error"></p>
        <button class="auth-btn" type="submit" id="reg-btn" data-i18n="tab.register">Crear cuenta</button>
      </form>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard-screen" class="hidden">
    <aside class="coach-sidebar">
      <div class="sidebar-logo">
        <span>🌙</span>
        <span>Meirins <strong>Coach</strong></span>
      </div>
      <p id="trainer-email" class="sidebar-email"></p>
      <nav class="sidebar-nav">
        <span class="sidebar-navitem active" data-i18n="clients">Mis alumnas</span>
      </nav>
      <div class="sidebar-code-box">
        <p class="sidebar-code-label" data-i18n="code.label">Tu código de entrenadora</p>
        <p id="trainer-code" class="sidebar-code">—</p>
        <p class="sidebar-code-hint" data-i18n="code.hint">Tus alumnas lo introducen en la app Meirins para conectarse contigo.</p>
      </div>
      <button class="sidebar-logout" onclick="handleLogout()" data-i18n="logout">Cerrar sesión</button>
    </aside>

    <main class="coach-main">
      <h1 class="coach-heading" data-i18n="clients">Mis alumnas</h1>
      <div id="clients-loading" class="coach-muted" data-i18n="loading">Cargando…</div>
      <div id="clients-empty" class="coach-empty hidden">
        <p class="coach-empty-title" data-i18n="empty.title">Aún no tienes alumnas conectadas</p>
        <p class="coach-muted" data-i18n="empty.hint">Cuando una alumna introduzca tu código en la app Meirins, aparecerá aquí.</p>
      </div>
      <div id="clients-list" class="clients-grid hidden"></div>
    </main>
  </div>

  <style>
    .coach-lang-btn { background: transparent; border: 1px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; cursor: pointer; }
    .coach-lang-btn.active { color: white; border-color: white; background: rgba(255,255,255,0.15); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://lpcvkzmfemxziuhdmzpx.supabase.co',
      'sb_publishable__JhEh4SY-q0NWRB5SO8-9Q_zLr_wszB'
    );

    // ── i18n ──
    const CT = {
      es: { back:'Volver', 'tab.login':'Entrar', 'tab.register':'Crear cuenta', 'placeholder.password':'Contraseña', 'placeholder.name':'Tu nombre', 'placeholder.password6':'Contraseña (mín. 6 caracteres)', clients:'Mis alumnas', 'code.label':'Tu código de entrenadora', 'code.hint':'Tus alumnas lo introducen en la app Meirins para conectarse contigo.', logout:'Cerrar sesión', loading:'Cargando…', 'empty.title':'Aún no tienes alumnas conectadas', 'empty.hint':'Cuando una alumna introduzca tu código en la app Meirins, aparecerá aquí.', active:'activa', noname:'Sin nombre' },
      en: { back:'Back', 'tab.login':'Log in', 'tab.register':'Create account', 'placeholder.password':'Password', 'placeholder.name':'Your name', 'placeholder.password6':'Password (min. 6 characters)', clients:'My clients', 'code.label':'Your trainer code', 'code.hint':'Your clients enter this code in the Meirins app to connect with you.', logout:'Log out', loading:'Loading…', 'empty.title':'No clients connected yet', 'empty.hint':'When a client enters your code in the Meirins app, they will appear here.', active:'active', noname:'No name' },
      fr: { back:'Retour', 'tab.login':'Se connecter', 'tab.register':'Créer un compte', 'placeholder.password':'Mot de passe', 'placeholder.name':'Ton prénom', 'placeholder.password6':'Mot de passe (min. 6 caractères)', clients:'Mes clientes', 'code.label':'Ton code coach', 'code.hint':'Tes clientes entrent ce code dans l\'app Meirins pour se connecter avec toi.', logout:'Se déconnecter', loading:'Chargement…', 'empty.title':'Aucune cliente connectée pour l\'instant', 'empty.hint':'Quand une cliente entre ton code dans l\'app Meirins, elle apparaîtra ici.', active:'active', noname:'Sans nom' },
    };
    let currentLang = localStorage.getItem('meirins_lang') || 'es';

    function setCoachLang(lang) {
      if (!CT[lang]) return;
      currentLang = lang;
      localStorage.setItem('meirins_lang', lang);
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (CT[lang][k]) el.textContent = CT[lang][k];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const k = el.dataset.i18nPlaceholder;
        if (CT[lang][k]) el.placeholder = CT[lang][k];
      });
      ['es','en','fr'].forEach(l => {
        const b = document.getElementById('cbtn-' + l);
        if (b) b.classList.toggle('active', l === lang);
      });
    }
    setCoachLang(currentLang);

    // ── Auth state ──
    sb.auth.onAuthStateChange((_e, session) => {
      if (session) showDashboard(session.user);
      else showAuth();
    });

    // ── Tabs ──
    function showTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    }

    // ── Login ──
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Entrando…'; btn.disabled = true;
      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      });
      if (error) {
        document.getElementById('login-error').textContent = error.message;
        btn.textContent = 'Entrar'; btn.disabled = false;
      }
    }

    // ── Register ──
    function generateCode(name) {
      const base = name.trim().toUpperCase().replace(/\s+/g, '').slice(0, 5);
      return base + Math.floor(1000 + Math.random() * 9000);
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creando cuenta…'; btn.disabled = true;
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) {
        document.getElementById('reg-error').textContent = error.message;
        btn.textContent = 'Crear cuenta'; btn.disabled = false;
        return;
      }

      // Si hay sesión activa (email confirmation desactivado), insertar y entrar
      if (data.session) {
        const { error: insertError } = await sb.from('trainers').insert({
          user_id: data.user.id, name, trainer_code: generateCode(name)
        });
        if (insertError) {
          document.getElementById('reg-error').textContent = insertError.message;
          btn.textContent = 'Crear cuenta'; btn.disabled = false;
          return;
        }
        showDashboard(data.user);
      } else {
        // Email confirmation requerido
        document.getElementById('reg-error').style.color = '#7c6af7';
        document.getElementById('reg-error').textContent = '¡Cuenta creada! Revisa tu email para confirmar y luego entra.';
        btn.textContent = 'Crear cuenta'; btn.disabled = false;
      }
    }

    // ── Logout ──
    async function handleLogout() { await sb.auth.signOut(); }

    // ── Show auth ──
    function showAuth() {
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('dashboard-screen').classList.add('hidden');
    }

    // ── Show dashboard ──
    async function showDashboard(user) {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      document.getElementById('trainer-email').textContent = user.email;

      const { data: trainerRow } = await sb.from('trainers').select('id, name, trainer_code').eq('user_id', user.id).single();
      if (trainerRow) {
        document.getElementById('trainer-code').textContent = trainerRow.trainer_code;
        const { data: clients } = await sb.from('trainer_clients')
          .select('*, profile:profiles(*)')
          .eq('trainer_id', trainerRow.id)
          .eq('status', 'active');
        renderClients(clients || []);
      } else {
        renderClients([]);
      }
    }

    // ── Render clients ──
    function renderClients(clients) {
      document.getElementById('clients-loading').classList.add('hidden');
      if (clients.length === 0) {
        document.getElementById('clients-empty').classList.remove('hidden');
      } else {
        const list = document.getElementById('clients-list');
        list.classList.remove('hidden');
        list.innerHTML = clients.map(c => {
          const p = c.profile || {};
          const initials = (p.name || p.email || '?')[0].toUpperCase();
          return `
            <div class="client-card">
              <div class="client-avatar">${initials}</div>
              <div class="client-info">
                <p class="client-name">${p.name || 'Sin nombre'}</p>
                <p class="client-meta">${p.email || ''}</p>
              </div>
              <span class="client-badge">activa</span>
            </div>`;
        }).join('');
      }
    }
  </script>
</body>
</html>
